<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | DMafouz Modern Dressing</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="dist/css/bootstrap.css">
    <script src="dist/js/bootstrap.js"></script>
</head>

<body>

<div class="container-fluid">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-md navbar-light bg-light">
        <a href="index.html" class="navbar-brand">
            <img src="images/images (10).jpeg" height="50" width="80" alt="">
            DMafouz Modern Dressing
        </a>

        <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="nav">
            <div class="navbar-nav ms-auto">
                <a href="index.html" class="nav-link">Home</a>
                <a href="about.html" class="nav-link">About</a>
                <a href="contact.html" class="nav-link active">Contact</a>
            </div>
        </div>
    </nav>

    <!-- Contact Header -->
    <section class="row bg-dark text-light text-center p-5">
        <h1>Contact Us</h1>
        <p>We would love to hear from you. Reach out anytime.</p>
    </section>

    <!-- Contact Section -->
    <section class="row p-5">

        <!-- Contact Form -->
        <div class="col-md-6">
            <h3 class="mb-4">Send Us a Message</h3>

            <form>
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" placeholder="Enter your name" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Subject</label>
                    <input type="text" class="form-control" placeholder="Message subject">
                </div>

                <div class="mb-3">
                    <label class="form-label">Message</label>
                    <textarea class="form-control" rows="5" placeholder="Write your message..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary">
                    Send Message
                </button>
            </form>
        </div>

        <!-- Contact Info -->
        <div class="col-md-6">
            <h3 class="mb-4">Contact Information</h3>

            <p><b> Location:</b> Nairobi, Kenya</p>
            <p><b> Phone:</b> +254 164 56546</p>
            <p><b> Email:</b> info@dmafouz.com</p>

            <hr>

            <h5>Follow Us</h5>
            <a href="https://www.facebook.com">
                <img src="images/fb.png" alt="">
            </a>
            <a href="https://www.instagram.com">
                <img src="images/in.png" alt="">
            </a>
            <a href="https://www.x.com">
                <img src="images/x.png" alt="">
            </a>
        </div>

    </section>

    <!-- Footer -->
    <section class="row bg-primary text-light text-center p-3">
        <p>© 2026 DMafouz Modern Dressing. All Rights Reserved.</p>
    </section>

</div>

</body>
</html>
